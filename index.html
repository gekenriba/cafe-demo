<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tawang Cafe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --forest-deep:    #0d2818;
      --forest-dark:    #1a3d28;
      --forest-mid:     #2d6147;
      --forest-bright:  #3d8c60;
      --forest-light:   #5ab882;
      --forest-pale:    #a8d5b8;
      --forest-mist:    #e8f4ed;
      --gold:           #c9a84c;
      --gold-light:     #e8c97a;
      --cream:          #f9f5ef;
      --warm-white:     #fefcf8;
      --text-dark:      #1a2e22;
      --text-mid:       #3d5c47;
      --text-light:     #7a9e87;
      --card-bg:        rgba(255,255,255,0.92);
      --shadow-sm:      0 2px 12px rgba(13,40,24,0.08);
      --shadow-md:      0 6px 28px rgba(13,40,24,0.14);
      --shadow-lg:      0 18px 60px rgba(13,40,24,0.18);
      --radius-sm:      10px;
      --radius-md:      18px;
      --radius-lg:      28px;
      --transition:     0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── BACKGROUND TEXTURE ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 10%, rgba(61,140,96,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(26,61,40,0.06) 0%, transparent 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d6147' fill-opacity='0.025'%3E%3Ccircle cx='30' cy='30' r='1.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      background: linear-gradient(160deg, var(--forest-deep) 0%, var(--forest-dark) 50%, var(--forest-mid) 100%);
      padding: 52px 24px 60px;
      text-align: center;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 100% at 30% 0%, rgba(201,168,76,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 80% at 80% 100%, rgba(90,184,130,0.1) 0%, transparent 50%);
    }

    /* Decorative leaf shapes */
    header::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0; right: 0;
      height: 40px;
      background: var(--cream);
      clip-path: ellipse(55% 100% at 50% 100%);
    }

    .header-badge {
      position: relative;
      display: inline-block;
      background: rgba(201,168,76,0.2);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 18px;
      backdrop-filter: blur(4px);
    }

    header h1 {
      position: relative;
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 58px);
      font-weight: 700;
      color: var(--warm-white);
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    header h1 span {
      color: var(--gold-light);
    }

    header p {
      position: relative;
      color: var(--forest-pale);
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Floating leaves decoration */
    .leaf {
      position: absolute;
      opacity: 0.15;
      animation: floatLeaf 8s ease-in-out infinite;
    }
    .leaf:nth-child(1) { top: 12%; left: 8%; font-size: 28px; animation-delay: 0s; }
    .leaf:nth-child(2) { top: 25%; right: 12%; font-size: 20px; animation-delay: 2s; }
    .leaf:nth-child(3) { bottom: 20%; left: 15%; font-size: 22px; animation-delay: 4s; }
    .leaf:nth-child(4) { bottom: 25%; right: 8%; font-size: 16px; animation-delay: 1s; }

    @keyframes floatLeaf {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(8deg); }
    }

    /* ── LAYOUT ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--forest-dark);
      margin: 36px 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 28px;
      background: linear-gradient(to bottom, var(--forest-bright), var(--forest-light));
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── CATEGORY FILTER PILLS ── */
    .category-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .pill {
      padding: 7px 18px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid var(--forest-pale);
      background: transparent;
      color: var(--text-mid);
      transition: var(--transition);
    }

    .pill.active, .pill:hover {
      background: var(--forest-mid);
      border-color: var(--forest-mid);
      color: white;
    }

    /* ── MENU GRID ── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    /* ── MENU CARD ── */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius-md);
      padding: 22px 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(45,97,71,0.08);
      transition: transform var(--transition), box-shadow var(--transition);
      position: relative;
      overflow: hidden;
      cursor: default;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--forest-bright), var(--forest-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform var(--transition);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }

    .card:hover::before { transform: scaleX(1); }

    .card-emoji {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 5px;
      line-height: 1.3;
    }

    .category-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--forest-bright);
      background: var(--forest-mist);
      padding: 3px 9px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .price {
      font-size: 22px;
      font-weight: 700;
      color: var(--forest-dark);
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .price sup {
      font-size: 13px;
      font-weight: 500;
      vertical-align: super;
    }

    /* Add to cart button */
    .add-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-bright));
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .add-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background var(--transition);
    }

    .add-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(45,97,71,0.4);
    }

    .add-btn:active { transform: scale(0.97); }

    .add-btn.added {
      background: linear-gradient(135deg, var(--forest-bright), var(--forest-light));
    }

    /* ── FLYING CART ANIMATION ── */
    .fly-item {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--forest-mid), var(--forest-bright));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(45,97,71,0.5);
      animation: flyToCart 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes flyToCart {
      0% { transform: scale(1); opacity: 1; }
      60% { transform: scale(0.7); opacity: 0.9; }
      100% { transform: scale(0.3); opacity: 0; }
    }

    /* ── CART SECTION ── */
    .cart-wrapper {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 30px 28px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(45,97,71,0.1);
      margin-top: 36px;
    }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cart-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--forest-dark);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cart-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--forest-bright);
      color: white;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      transition: transform 0.3s;
    }

    .cart-count.bump { animation: bump 0.3s ease; }
    @keyframes bump { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }

    /* Cart item rows */
    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid rgba(45,97,71,0.08);
      gap: 12px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .cart-item-name {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-dark);
      flex: 1;
    }

    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--forest-pale);
      background: transparent;
      color: var(--forest-mid);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      padding: 0;
    }

    .qty-btn:hover {
      background: var(--forest-mid);
      border-color: var(--forest-mid);
      color: white;
    }

    .qty-num {
      font-weight: 600;
      font-size: 14px;
      min-width: 20px;
      text-align: center;
    }

    .cart-item-price {
      font-weight: 600;
      font-size: 15px;
      color: var(--forest-dark);
      min-width: 60px;
      text-align: right;
    }

    .remove-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: #fde8e8;
      color: #c0392b;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      padding: 0;
      flex-shrink: 0;
    }

    .remove-btn:hover { background: #c0392b; color: white; }

    /* Total row */
    .cart-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0 0;
      margin-top: 4px;
    }

    .cart-total-label {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--text-mid);
    }

    .cart-total-amount {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--forest-dark);
    }

    /* ── CUSTOMER DETAILS ── */
    .details-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(45,97,71,0.1);
    }

    .details-section h3 {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      color: var(--forest-dark);
      margin-bottom: 14px;
    }

    .input-group {
      position: relative;
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1.5px solid rgba(45,97,71,0.15);
      background: var(--forest-mist);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text-dark);
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--forest-bright);
      box-shadow: 0 0 0 3px rgba(61,140,96,0.12);
      background: white;
    }

    .input-group input::placeholder { color: var(--text-light); }

    /* ── PLACE ORDER BUTTON ── */
    .place-order-btn {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--forest-dark), var(--forest-bright));
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.3px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      box-shadow: 0 6px 24px rgba(26,61,40,0.3);
    }

    .place-order-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(26,61,40,0.4);
    }

    .place-order-btn:active { transform: translateY(0); }

    /* ── EMPTY CART ── */
    .empty-cart {
      text-align: center;
      padding: 36px 20px;
      color: var(--text-light);
    }

    .empty-cart .empty-icon { font-size: 44px; margin-bottom: 10px; }
    .empty-cart p { font-size: 15px; }

    /* ── PAYMENT PANEL ── */
    .payment-panel {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: var(--shadow-lg);
      border: 1px solid rgba(45,97,71,0.12);
      margin-top: 28px;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .payment-panel h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--forest-dark);
      margin-bottom: 6px;
    }

    .payment-panel .subtitle {
      color: var(--text-light);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* Amount display */
    .pay-amount-box {
      background: linear-gradient(135deg, var(--forest-deep), var(--forest-dark));
      border-radius: var(--radius-md);
      padding: 22px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .pay-amount-label {
      color: var(--forest-pale);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .pay-amount-value {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--gold-light);
    }

    /* UPI ID copy box */
    .upi-copy-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--forest-mist);
      border: 1.5px solid var(--forest-pale);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 24px;
    }

    .upi-copy-box span {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-dark);
      font-family: 'Courier New', monospace;
    }

    .copy-btn {
      padding: 6px 14px;
      border-radius: 6px;
      background: var(--forest-mid);
      color: white;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .copy-btn:hover { background: var(--forest-dark); }
    .copy-btn.copied { background: var(--forest-light); }

    /* QR Code container */
    .qr-container {
      text-align: center;
      margin-bottom: 24px;
    }

    .qr-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 14px;
    }

    #qr-code {
      display: inline-block;
      padding: 16px;
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(45,97,71,0.1);
    }

    /* UPI App buttons */
    .upi-apps-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 14px;
      text-align: center;
    }

    .upi-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .upi-app-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 10px;
      border-radius: var(--radius-sm);
      background: var(--forest-mist);
      border: 1.5px solid var(--forest-pale);
      color: var(--forest-dark);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
    }

    .upi-app-btn:hover {
      background: var(--forest-mid);
      border-color: var(--forest-mid);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(45,97,71,0.3);
    }

    .upi-app-icon { font-size: 18px; }

    /* Info note */
    .info-note {
      background: #fffbeb;
      border: 1px solid #f0d98a;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 13px;
      color: #7a6015;
      line-height: 1.6;
      margin-top: 16px;
    }

    .info-note strong { color: #5a4510; }

    /* Confirm done button */
    .done-btn {
      width: 100%;
      margin-top: 16px;
      padding: 14px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 2px solid var(--forest-mid);
      color: var(--forest-mid);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }
    .done-btn:hover { background: var(--forest-mid); color: white; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--forest-dark);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 10000;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── ADMIN LINK ── */
    .admin-link {
      text-align: center;
      margin-top: 32px;
      padding: 20px;
    }

    .admin-link a {
      color: var(--text-light);
      font-size: 13px;
      text-decoration: none;
      border-bottom: 1px dashed var(--text-light);
      transition: color var(--transition);
    }

    .admin-link a:hover { color: var(--forest-bright); }

    /* ── LOADING SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, #e8f4ed 25%, #d0ebd8 50%, #e8f4ed 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .skeleton-card { height: 180px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .pay-amount-value { font-size: 28px; }
      .upi-buttons { grid-template-columns: 1fr 1fr; }
      .cart-wrapper, .payment-panel { padding: 22px 16px; }
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text-light);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(45,97,71,0.12);
    }

    /* ── SUCCESS STATE ── */
    .success-banner {
      text-align: center;
      padding: 32px 20px;
      animation: slideUp 0.4s ease;
    }
    .success-icon { font-size: 56px; margin-bottom: 12px; }
    .success-banner h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--forest-dark);
      margin-bottom: 8px;
    }
    .success-banner p { color: var(--text-light); font-size: 14px; }

    /* ── NEW ORDER BTN ── */
    .new-order-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      border-radius: 50px;
      background: var(--forest-bright);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: var(--transition);
    }
    .new-order-btn:hover { background: var(--forest-dark); transform: translateY(-2px); }
  </style>
</head>

<body>

<header>
  <span class="leaf">🍃</span>
  <span class="leaf">🌿</span>
  <span class="leaf">🍃</span>
  <span class="leaf">🌱</span>

  <div class="header-badge">Tawang, Arunachal Pradesh</div>
  <h1>Tawang <span>Cafe</span></h1>
  <p>Fresh food &amp; drinks, crafted with care</p>
</header>

<div class="container">

  <h2 class="section-title">Today's Menu</h2>
  <div id="categoryPills" class="category-pills"></div>
  <div id="menu" class="menu-grid"></div>

  <div class="cart-wrapper">
    <div class="cart-header">
      <h2>🛒 Your Cart <span class="cart-count" id="cartCount">0</span></h2>
    </div>

    <div id="cartItems">
      <div class="empty-cart">
        <div class="empty-icon">🍵</div>
        <p>Your cart is empty — add something delicious!</p>
      </div>
    </div>

    <div class="cart-total" id="cartTotalRow" style="display:none;">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-amount">₹<span id="total">0</span></span>
    </div>

    <div class="details-section" id="detailsSection" style="display:none;">
      <h3>Your Details</h3>
      <div class="input-group">
        <label>Full Name</label>
        <input id="customerName" placeholder="e.g. Tenzin Norbu" />
      </div>
      <div class="input-group">
        <label>Phone Number</label>
        <input id="phone" type="tel" placeholder="10-digit mobile number" />
      </div>
      <div class="input-group">
        <label>Table / Pickup Note</label>
        <input id="tableNumber" placeholder="e.g. Table 3 or Takeaway" />
      </div>
      <button class="place-order-btn" onclick="placeOrder()">
        <span>✓</span> Confirm Order &amp; Pay
      </button>
    </div>
  </div>

  <div id="paymentArea"></div>

  <div class="admin-link">
    <a href="admin.html">⚙ Owner Admin Panel</a>
  </div>

</div>

<!-- Flying animation element (reused) -->
<div id="flyItem" class="fly-item" style="display:none;">🛒</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<!-- QR Code library (lightweight, no external CDN needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, getDocs, addDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAYonKe7d9rNp59LOkzEbBowQrcsFH32ts",
    authDomain: "cafe-b80ce.firebaseapp.com",
    projectId: "cafe-b80ce",
    storageBucket: "cafe-b80ce.firebasestorage.app",
    messagingSenderId: "110426428527",
    appId: "1:110426428527:web:d91f0d414bd13a61ea699a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  /* ─────────────────────────────────────────────
     IMPORTANT: CAFE OWNER'S REAL UPI ID BELOW
     ───────────────────────────────────────────── */
  const CAFE_UPI_ID   = "geliriba11@oksbi";
  const CAFE_NAME     = "Tawang Cafe";

  /* ── STATE ── */
  let menuItems   = [];
  let cart        = [];
  let activeFilter = "All";

  /* ── HELPERS ── */
  function cleanPrice(v) {
    const n = Number(String(v).replace(/[^0-9.]/g, ""));
    return isNaN(n) ? 0 : n;
  }

  /*
    FIX for "amount limit exceeded":
    The bug is caused by passing the amount as a decimal string like "50.00".
    Some UPI apps reject this. We send the amount as a plain integer when possible,
    and use the standard `upi://pay` intent scheme (works on both Android & iOS).
    We also provide a QR code as the most reliable fallback.
  */
  function formatUPIAmount(total) {
    // If it's a whole number, send as integer — avoids decimal format rejection
    if (Number.isInteger(total)) return String(total);
    return total.toFixed(2);
  }

  function buildUPILink(total) {
    const params = new URLSearchParams({
      pa: CAFE_UPI_ID,
      pn: encodeURIComponent(CAFE_NAME),
      am: formatUPIAmount(total),
      cu: "INR",
      tn: encodeURIComponent("Tawang Cafe Order")
    });
    return "upi://pay?" + params.toString();
  }

  /* Category icons */
  const categoryEmoji = {
    "Tea":      "🍵",
    "Coffee":   "☕",
    "Food":     "🍱",
    "Snacks":   "🥪",
    "Drinks":   "🧃",
    "Dessert":  "🍰",
    "Default":  "🍽️"
  };

  function getEmoji(category) {
    return categoryEmoji[category] || categoryEmoji["Default"];
  }

  /* ── TOAST ── */
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  /* ── FLYING CART ANIMATION ── */
  function flyToCart(btn, emoji) {
    const btnRect  = btn.getBoundingClientRect();
    const cartEl   = document.getElementById("cartCount");
    const cartRect = cartEl.getBoundingClientRect();

    const fly = document.createElement("div");
    fly.className = "fly-item";
    fly.textContent = emoji || "🛒";
    fly.style.cssText = `
      left: ${btnRect.left + btnRect.width/2 - 22}px;
      top:  ${btnRect.top  + window.scrollY + btnRect.height/2 - 22}px;
      position: absolute;
    `;
    document.body.appendChild(fly);

    // Animate via JS for precise path
    const startX  = btnRect.left + btnRect.width/2;
    const startY  = btnRect.top  + btnRect.height/2;
    const endX    = cartRect.left + cartRect.width/2;
    const endY    = cartRect.top  + cartRect.height/2;

    fly.animate([
      { left: startX - 22 + "px", top: startY - 22 + "px", opacity: 1, transform: "scale(1)" },
      { left: (startX + endX)/2 - 22 + "px", top: Math.min(startY, endY) - 60 + "px", opacity: 0.9, transform: "scale(0.8)" },
      { left: endX - 22 + "px", top: endY - 22 + "px", opacity: 0, transform: "scale(0.3)" }
    ], {
      duration: 650,
      easing: "cubic-bezier(0.4, 0, 0.2, 1)",
      fill: "forwards"
    }).onfinish = () => {
      fly.remove();
      // Bump cart count
      const cc = document.getElementById("cartCount");
      cc.classList.remove("bump");
      void cc.offsetWidth;
      cc.classList.add("bump");
    };
  }

  /* ── LOAD MENU ── */
  async function loadMenu() {
    const menuDiv = document.getElementById("menu");

    // Show skeletons
    menuDiv.innerHTML = Array(4).fill('<div class="skeleton skeleton-card"></div>').join("");

    try {
      const snap = await getDocs(collection(db, "menu"));
      menuItems = [];

      snap.forEach(docSnap => {
        const item = { id: docSnap.id, ...docSnap.data() };
        if (item.available === true) {
          item.price = cleanPrice(item.price);
          menuItems.push(item);
        }
      });

      if (menuItems.length === 0) {
        menuDiv.innerHTML = '<div class="empty-cart"><div class="empty-icon">🍃</div><p>No items available today. Check back soon!</p></div>';
        return;
      }

      // Build category pills
      const cats = ["All", ...new Set(menuItems.map(i => i.category || "Other"))];
      const pillsDiv = document.getElementById("categoryPills");
      pillsDiv.innerHTML = cats.map(c =>
        `<button class="pill ${c === 'All' ? 'active' : ''}" onclick="filterCategory('${c}')">${c}</button>`
      ).join("");

      renderMenu();

    } catch (err) {
      console.error(err);
      menuDiv.innerHTML = '<div class="empty-cart"><div class="empty-icon">⚠️</div><p>Error loading menu. Please check your connection.</p></div>';
    }
  }

  function renderMenu() {
    const menuDiv  = document.getElementById("menu");
    const filtered = activeFilter === "All"
      ? menuItems
      : menuItems.filter(i => (i.category || "Other") === activeFilter);

    if (filtered.length === 0) {
      menuDiv.innerHTML = `<div class="empty-cart"><p>No items in this category today.</p></div>`;
      return;
    }

    menuDiv.innerHTML = "";
    filtered.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <span class="card-emoji">${getEmoji(item.category)}</span>
        <h3>${item.name}</h3>
        <span class="category-tag">${item.category || "Cafe Item"}</span>
        <div class="price"><sup>₹</sup>${item.price % 1 === 0 ? item.price : item.price.toFixed(2)}</div>
        <button class="add-btn" id="btn-${item.id}" onclick="addToCart('${item.id}', this)">
          <span>+</span> Add to Cart
        </button>
      `;
      menuDiv.appendChild(card);
    });
  }

  window.filterCategory = function(cat) {
    activeFilter = cat;
    document.querySelectorAll(".pill").forEach(p => {
      p.classList.toggle("active", p.textContent === cat);
    });
    renderMenu();
  };

  /* ── ADD TO CART ── */
  window.addToCart = function(id, btn) {
    const item = menuItems.find(i => i.id === id);
    if (!item) return;

    flyToCart(btn, getEmoji(item.category));

    const existing = cart.find(i => i.id === id);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ id: item.id, name: item.name, price: cleanPrice(item.price), quantity: 1 });
    }

    // Brief visual feedback on button
    btn.textContent = "✓ Added";
    btn.classList.add("added");
    setTimeout(() => {
      btn.innerHTML = "<span>+</span> Add to Cart";
      btn.classList.remove("added");
    }, 1000);

    renderCart();
    document.getElementById("paymentArea").innerHTML = "";
    showToast(`${item.name} added to cart`);
  };

  /* ── RENDER CART ── */
  function renderCart() {
    const cartDiv   = document.getElementById("cartItems");
    const countSpan = document.getElementById("cartCount");
    const totalRow  = document.getElementById("cartTotalRow");
    const details   = document.getElementById("detailsSection");

    const totalQty = cart.reduce((s, i) => s + i.quantity, 0);
    countSpan.textContent = totalQty;

    if (cart.length === 0) {
      cartDiv.innerHTML = `
        <div class="empty-cart">
          <div class="empty-icon">🍵</div>
          <p>Your cart is empty — add something delicious!</p>
        </div>`;
      totalRow.style.display = "none";
      details.style.display  = "none";
      return;
    }

    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, idx) => {
      const itemTotal = cleanPrice(item.price) * item.quantity;
      total += itemTotal;
      const row = document.createElement("div");
      row.className = "cart-item";
      row.innerHTML = `
        <span class="cart-item-name">${item.name}</span>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
          <span class="qty-num">${item.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${idx}, 1)">+</button>
        </div>
        <span class="cart-item-price">₹${itemTotal % 1 === 0 ? itemTotal : itemTotal.toFixed(2)}</span>
        <button class="remove-btn" onclick="removeItem(${idx})" title="Remove">✕</button>
      `;
      cartDiv.appendChild(row);
    });

    document.getElementById("total").textContent = total % 1 === 0 ? total : total.toFixed(2);
    totalRow.style.display = "flex";
    details.style.display  = "block";
  }

  window.changeQty = function(idx, delta) {
    cart[idx].quantity += delta;
    if (cart[idx].quantity <= 0) cart.splice(idx, 1);
    renderCart();
    document.getElementById("paymentArea").innerHTML = "";
  };

  window.removeItem = function(idx) {
    cart.splice(idx, 1);
    renderCart();
    document.getElementById("paymentArea").innerHTML = "";
  };

  /* ── PLACE ORDER ── */
  window.placeOrder = async function() {
    const name  = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const table = document.getElementById("tableNumber").value.trim();

    if (cart.length === 0)       { showToast("Please add items to your cart first."); return; }
    if (!name)                   { showToast("Please enter your name."); return; }
    if (!phone || phone.length < 6) { showToast("Please enter a valid phone number."); return; }

    const total = cart.reduce((s, i) => s + cleanPrice(i.price) * i.quantity, 0);
    if (!total || isNaN(total) || total <= 0) { showToast("Amount error — check item prices in Firebase."); return; }

    const safeCart = cart.map(i => ({
      id:       i.id,
      name:     i.name,
      price:    cleanPrice(i.price),
      quantity: i.quantity
    }));

    const orderData = {
      customerName:  name,
      phone:         phone,
      tableNumber:   table || "Not given",
      items:         safeCart,
      total:         total,
      status:        "New",
      paymentStatus: "Pending",
      createdAt:     serverTimestamp()
    };

    // Disable button to prevent double-tap
    const btn = document.querySelector(".place-order-btn");
    btn.disabled = true;
    btn.textContent = "Saving order…";

    try {
      await addDoc(collection(db, "orders"), orderData);

      /* ── FIXED UPI LINK ──
         Key fix: amount as plain integer (no ".00") to prevent "limit exceeded" error.
         Using standard upi://pay scheme — works with ALL UPI apps. */
      const upiLink     = buildUPILink(total);
      const displayAmt  = total % 1 === 0 ? total : total.toFixed(2);

      const paymentArea = document.getElementById("paymentArea");
      paymentArea.innerHTML = `
        <div class="payment-panel">
          <h2>Complete Your Payment</h2>
          <p class="subtitle">Order saved successfully — please pay to confirm.</p>

          <div class="pay-amount-box">
            <div>
              <div class="pay-amount-label">Amount Due</div>
              <div style="color:var(--forest-pale);font-size:12px;margin-top:2px;">for ${name}</div>
            </div>
            <div class="pay-amount-value">₹${displayAmt}</div>
          </div>

          <div class="qr-label">Scan QR Code to Pay</div>
          <div class="qr-container">
            <div id="qr-code"></div>
          </div>

          <div class="upi-copy-box">
            <span id="upiIdText">${CAFE_UPI_ID}</span>
            <button class="copy-btn" id="copyBtn" onclick="copyUPI()">Copy</button>
          </div>

          <div class="divider">or open directly in app</div>

          <div class="upi-label" style="text-align:center;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);margin-bottom:14px;">Tap to Open UPI App</div>

          <div class="upi-buttons">
            <a class="upi-app-btn" href="${upiLink}">
              <span class="upi-app-icon">📱</span> Any UPI App
            </a>
            <a class="upi-app-btn" href="tez://upi/pay?pa=${CAFE_UPI_ID}&pn=${encodeURIComponent(CAFE_NAME)}&am=${formatUPIAmount(total)}&cu=INR">
              <span class="upi-app-icon">🟢</span> Google Pay
            </a>
            <a class="upi-app-btn" href="phonepe://pay?pa=${CAFE_UPI_ID}&pn=${encodeURIComponent(CAFE_NAME)}&am=${formatUPIAmount(total)}&cu=INR">
              <span class="upi-app-icon">🟣</span> PhonePe
            </a>
            <a class="upi-app-btn" href="paytmmp://pay?pa=${CAFE_UPI_ID}&pn=${encodeURIComponent(CAFE_NAME)}&am=${formatUPIAmount(total)}&cu=INR">
              <span class="upi-app-icon">🔵</span> Paytm
            </a>
          </div>

          <div class="info-note">
            💡 <strong>Tip:</strong> The QR code scan is the most reliable way to pay.
            After payment, show the success screen to our staff. Thank you!
          </div>

          <button class="done-btn" onclick="orderDone()">✓ I've Completed Payment</button>
        </div>
      `;

      // Generate QR code
      if (window.QRCode) {
        new QRCode(document.getElementById("qr-code"), {
          text:          upiLink,
          width:         180,
          height:        180,
          colorDark:     "#0d2818",
          colorLight:    "#ffffff",
          correctLevel:  QRCode.CorrectLevel.M
        });
      }

      paymentArea.scrollIntoView({ behavior: "smooth", block: "start" });

    } catch (err) {
      console.error(err);
      showToast("Could not save order. Check Firebase rules.");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "<span>✓</span> Confirm Order & Pay";
    }
  };

  /* ── COPY UPI ── */
  window.copyUPI = function() {
    navigator.clipboard.writeText(CAFE_UPI_ID).then(() => {
      const btn = document.getElementById("copyBtn");
      btn.textContent = "Copied!";
      btn.classList.add("copied");
      showToast("UPI ID copied!");
      setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
    });
  };

  /* ── formatUPIAmount accessible globally (for href in buttons) ── */
  window.formatUPIAmount = formatUPIAmount;

  /* ── ORDER DONE ── */
  window.orderDone = function() {
    cart = [];
    renderCart();

    document.getElementById("customerName").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("tableNumber").value = "";

    const paymentArea = document.getElementById("paymentArea");
    paymentArea.innerHTML = `
      <div class="cart-wrapper">
        <div class="success-banner">
          <div class="success-icon">🎉</div>
          <h3>Payment Confirmed!</h3>
          <p>Thank you for your order. We'll have it ready shortly.</p>
          <button class="new-order-btn" onclick="document.getElementById('paymentArea').innerHTML=''; window.scrollTo({top:0,behavior:'smooth'})">
            + Place Another Order
          </button>
        </div>
      </div>`;
    paymentArea.scrollIntoView({ behavior: "smooth", block: "start" });
    showToast("Order complete! Enjoy your meal 🍃");
  };

  /* ── INIT ── */
  loadMenu();
  renderCart();
</script>

</body>
</html>
