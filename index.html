<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tawang Cafe Order</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f3ec;
      color: #2b2118;
    }

    header {
      background: linear-gradient(135deg, #4b2e1f, #8b5e34);
      color: white;
      padding: 35px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
    }

    header p {
      margin-top: 8px;
      font-size: 16px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .section-title {
      font-size: 24px;
      margin: 25px 0 15px;
      border-left: 5px solid #8b5e34;
      padding-left: 10px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin: 0 0 8px;
    }

    .category {
      font-size: 13px;
      color: #777;
      margin-bottom: 8px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: #6b3f25;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4b2e1f;
    }

    .cart {
      background: white;
      margin-top: 30px;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 5px 16px rgba(0,0,0,0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 8px 0;
      gap: 10px;
      align-items: center;
    }

    .remove-btn {
      background: #b3261e;
      padding: 6px 9px;
      font-size: 12px;
    }

    input {
      width: 100%;
      padding: 11px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .pay-btn {
      width: 100%;
      margin-top: 12px;
      background: #0b8f4d;
      font-size: 16px;
    }

    .payment-option {
      display: block;
      text-decoration: none;
      margin-top: 10px;
    }

    .payment-box {
      background: #fff7e8;
      border: 1px solid #e0c99f;
      margin-top: 25px;
      padding: 20px;
      border-radius: 16px;
    }

    .empty {
      text-align: center;
      padding: 30px;
      color: #777;
      background: white;
      border-radius: 14px;
    }

    .admin-link {
      text-align: center;
      margin-top: 25px;
    }

    .admin-link a {
      color: #6b3f25;
      font-weight: bold;
    }

    .small-note {
      font-size: 14px;
      color: #777;
      line-height: 1.5;
    }
  </style>
</head>

<body>

<header>
  <h1>Tawang Cafe</h1>
  <p>Order fresh food, tea, coffee and snacks online</p>
</header>

<div class="container">

  <h2 class="section-title">Today’s Available Menu</h2>
  <div id="menu" class="menu-grid"></div>

  <div class="cart">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>

    <h3>Total: ₹<span id="total">0.00</span></h3>

    <h3>Customer Details</h3>
    <input id="customerName" placeholder="Your name" />
    <input id="phone" placeholder="Phone number" />
    <input id="tableNumber" placeholder="Table number / Pickup note" />

    <button class="pay-btn" onclick="placeOrder()">Place Order</button>
  </div>

  <div id="paymentArea"></div>

  <div class="admin-link">
    <a href="admin.html">Owner Admin Page</a>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAYonKe7d9rNp59LOkzEbBowQrcsFH32ts",
    authDomain: "cafe-b80ce.firebaseapp.com",
    projectId: "cafe-b80ce",
    storageBucket: "cafe-b80ce.firebasestorage.app",
    messagingSenderId: "110426428527",
    appId: "1:110426428527:web:d91f0d414bd13a61ea699a",
    measurementId: "G-0JVCTK651G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /*
    IMPORTANT:
    Put the cafe owner's real UPI ID here.
    Example:
    const CAFE_UPI_ID = "tawangcafe@oksbi";
  */
  const CAFE_UPI_ID = "geliriba11@oksbi";
  const CAFE_NAME = "Tawang Cafe";

  let menuItems = [];
  let cart = [];

  function cleanPrice(value) {
    const number = Number(String(value).replace(/[^0-9.]/g, ""));
    return isNaN(number) ? 0 : number;
  }

  async function loadMenu() {
    const menuDiv = document.getElementById("menu");
    menuDiv.innerHTML = "Loading menu...";

    try {
      const querySnapshot = await getDocs(collection(db, "menu"));
      menuItems = [];

      querySnapshot.forEach((docSnap) => {
        const item = { id: docSnap.id, ...docSnap.data() };

        if (item.available === true) {
          item.price = cleanPrice(item.price);
          menuItems.push(item);
        }
      });

      if (menuItems.length === 0) {
        menuDiv.innerHTML = '<div class="empty">No items available today.</div>';
        return;
      }

      menuDiv.innerHTML = "";

      menuItems.forEach((item) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <h3>${item.name}</h3>
          <div class="category">${item.category || "Cafe Item"}</div>
          <div class="price">₹${item.price.toFixed(2)}</div>
          <button onclick="addToCart('${item.id}')">Add to Cart</button>
        `;

        menuDiv.appendChild(card);
      });

    } catch (error) {
      console.error(error);
      menuDiv.innerHTML = '<div class="empty">Error loading menu. Check Firebase rules.</div>';
    }
  }

  window.addToCart = function(id) {
    const item = menuItems.find(i => i.id === id);
    if (!item) return;

    const existing = cart.find(i => i.id === id);

    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({
        id: item.id,
        name: item.name,
        price: cleanPrice(item.price),
        quantity: 1
      });
    }

    renderCart();

    document.getElementById("paymentArea").innerHTML = "";
  };

  function renderCart() {
    const cartDiv = document.getElementById("cartItems");
    const totalSpan = document.getElementById("total");

    if (cart.length === 0) {
      cartDiv.innerHTML = "<p>Your cart is empty.</p>";
      totalSpan.textContent = "0.00";
      return;
    }

    cartDiv.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
      const itemTotal = cleanPrice(item.price) * item.quantity;
      total += itemTotal;

      const row = document.createElement("div");
      row.className = "cart-item";

      row.innerHTML = `
        <span>${item.name} × ${item.quantity}</span>
        <span>
          ₹${itemTotal.toFixed(2)}
          <button class="remove-btn" onclick="removeItem(${index})">X</button>
        </span>
      `;

      cartDiv.appendChild(row);
    });

    totalSpan.textContent = total.toFixed(2);
  }

  window.removeItem = function(index) {
    cart.splice(index, 1);
    renderCart();
    document.getElementById("paymentArea").innerHTML = "";
  };

  window.placeOrder = async function() {
    const name = document.getElementById("customerName").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const table = document.getElementById("tableNumber").value.trim();

    if (cart.length === 0) {
      alert("Please add items to cart.");
      return;
    }

    if (!name || !phone) {
      alert("Please enter your name and phone number.");
      return;
    }

    const total = cart.reduce((sum, item) => {
      return sum + cleanPrice(item.price) * item.quantity;
    }, 0);

    if (!total || isNaN(total) || total <= 0) {
      alert("Amount error. Please check item price in Firebase.");
      return;
    }

    const finalAmount = total.toFixed(2);

    const safeCart = cart.map(item => ({
      id: item.id,
      name: item.name,
      price: cleanPrice(item.price),
      quantity: item.quantity
    }));

    const orderData = {
      customerName: name,
      phone: phone,
      tableNumber: table || "Not given",
      items: safeCart,
      total: Number(finalAmount),
      status: "New",
      paymentStatus: "Pending",
      createdAt: serverTimestamp()
    };

    try {
      await addDoc(collection(db, "orders"), orderData);

      const upiParams = new URLSearchParams({
        pa: CAFE_UPI_ID,
        pn: CAFE_NAME,
        am: finalAmount,
        cu: "INR"
      });

      const genericUPI = "upi://pay?" + upiParams.toString();
      const phonePeUPI = "phonepe://pay?" + upiParams.toString();
      const googlePayUPI = "tez://upi/pay?" + upiParams.toString();
      const paytmUPI = "paytmmp://pay?" + upiParams.toString();

      const paymentArea = document.getElementById("paymentArea");

      paymentArea.innerHTML = `
        <div class="payment-box">
          <h2>Complete Payment</h2>

          <p><strong>Amount:</strong> ₹${finalAmount}</p>
          <p><strong>UPI ID:</strong> ${CAFE_UPI_ID}</p>

          <p class="small-note">
            Your order has been saved. Tap one payment option below.
            If one app does not complete payment, come back and try another option.
          </p>

          <a class="payment-option" href="${genericUPI}">
            <button class="pay-btn">Pay with Any UPI App</button>
          </a>

          <a class="payment-option" href="${phonePeUPI}">
            <button class="pay-btn">Pay with PhonePe</button>
          </a>

          <a class="payment-option" href="${googlePayUPI}">
            <button class="pay-btn">Pay with Google Pay</button>
          </a>

          <a class="payment-option" href="${paytmUPI}">
            <button class="pay-btn">Pay with Paytm</button>
          </a>

          <p class="small-note">
            After payment, show the payment success screen to the cafe owner.
          </p>
        </div>
      `;

      alert("Order saved. Now tap a UPI payment button below.");

      paymentArea.scrollIntoView({ behavior: "smooth" });

    } catch (error) {
      console.error(error);
      alert("Order could not be saved. Please check Firebase rules.");
    }
  };

  loadMenu();
  renderCart();
</script>

</body>
</html>
